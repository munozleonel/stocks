name: Update Portfolio Data

on:
  # Run every weekday at 6:30 AM and 11:30 PM AEST (UTC+10)
  # = 8:30 PM and 1:30 PM UTC (covers ASX open + US market close)
  schedule:
    - cron: "30 8 * * 1-5"   # 6:30 AM AEST  — before ASX open
    - cron: "30 13 * * 1-5"  # 11:30 PM AEST — after US close
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit data.json back to the repo

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-yfinance
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch market data
        run: python scripts/fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          # Only commit if something changed
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
